<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ultimate Hub</title>
    <style>
        :root {
            --bg: #080808;
            --s1: #111;
            --s2: #1a1a1a;
            --s3: #242424;
            --acc: #ff2d2d;
            --acc2: #ff6a00;
            --text: #f0f0f0;
            --muted: #666;
            --border: #222;
            --st: env(safe-area-inset-top);
            --sb: env(safe-area-inset-bottom);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif; overflow-x:hidden; }

        /* HEADER */
        .hdr {
            position:fixed; top:0; left:0; right:0; z-index:200;
            background:rgba(8,8,8,0.95);
            backdrop-filter:blur(24px);
            -webkit-backdrop-filter:blur(24px);
            padding-top:calc(var(--st) + 10px);
            padding-bottom:10px;
            border-bottom:1px solid var(--border);
        }
        .hdr-row1 { display:flex; align-items:center; gap:10px; padding:0 14px 10px; }
        .logo {
            font-size:1.3rem; font-weight:900; letter-spacing:-1px; flex-shrink:0;
            background:linear-gradient(135deg,var(--acc),var(--acc2));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .search-box {
            flex:1; position:relative;
        }
        .search-box input {
            width:100%; background:var(--s2); border:1.5px solid var(--border);
            border-radius:12px; padding:10px 36px 10px 14px;
            color:var(--text); font-size:0.92rem; outline:none;
            -webkit-appearance:none; transition:border-color 0.2s;
        }
        .search-box input:focus { border-color:var(--acc); }
        .search-box input::placeholder { color:var(--muted); }
        .clr-btn {
            position:absolute; right:8px; top:50%; transform:translateY(-50%);
            background:var(--muted); border:none; color:#000;
            width:18px; height:18px; border-radius:50%;
            font-size:10px; font-weight:800; cursor:pointer;
            display:none; align-items:center; justify-content:center;
        }

        /* SITE TABS */
        .site-tabs {
            display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch;
            scrollbar-width:none; padding:0 14px;
        }
        .site-tabs::-webkit-scrollbar { display:none; }
        .stab {
            flex-shrink:0; display:flex; align-items:center; gap:5px;
            padding:6px 12px; border-radius:20px;
            border:1.5px solid var(--border); background:var(--s2);
            color:var(--muted); font-size:0.75rem; font-weight:700;
            cursor:pointer; transition:all 0.18s; white-space:nowrap;
        }
        .stab.active { border-color:var(--acc); background:var(--acc); color:#fff; }
        .stab-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

        /* MAIN */
        .main { padding-top:118px; padding-bottom:calc(var(--sb) + 24px); }

        /* SEARCH HEADER BAR */
        .search-bar {
            display:none; align-items:center; justify-content:space-between;
            padding:10px 14px; background:var(--s1); border-bottom:1px solid var(--border);
        }
        .search-bar.show { display:flex; }
        .search-bar-text { font-size:0.8rem; color:var(--muted); }
        .search-bar-text strong { color:var(--text); }

        /* OPEN ALL BTN */
        .open-all {
            margin:14px; border-radius:14px; overflow:hidden;
            display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border);
        }
        .open-btn {
            display:block; padding:13px 10px; text-align:center;
            background:var(--s2); color:var(--text);
            font-size:0.78rem; font-weight:700; text-decoration:none;
            cursor:pointer; border:none; transition:background 0.15s;
        }
        .open-btn:active { background:var(--s3); }
        .open-btn .dot { display:block; font-size:1rem; margin-bottom:2px; }
        .open-btn.primary {
            grid-column:1/-1; background:linear-gradient(135deg,var(--acc),var(--acc2));
            font-size:0.9rem; padding:15px;
        }

        /* SECTION LABEL */
        .sec-label {
            font-size:0.65rem; font-weight:800; letter-spacing:1.5px;
            text-transform:uppercase; color:var(--muted);
            padding:16px 14px 8px;
        }

        /* VIDEO GRID */
        .vgrid {
            display:grid; grid-template-columns:1fr 1fr;
            gap:8px; padding:0 10px;
        }
        .vcard {
            background:var(--s1); border-radius:10px; overflow:hidden;
            border:1px solid var(--border); text-decoration:none; display:block;
            transition:transform 0.12s;
        }
        .vcard:active { transform:scale(0.95); }
        .vthumb {
            width:100%; aspect-ratio:16/9; background:var(--s2);
            position:relative; display:flex; align-items:center; justify-content:center;
            font-size:2rem; overflow:hidden;
        }
        .vthumb-grad {
            position:absolute; inset:0;
            background:linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 60%);
        }
        .vplay {
            position:absolute;
            width:36px; height:36px; border-radius:50%;
            background:rgba(255,45,45,0.88);
            display:flex; align-items:center; justify-content:center;
            font-size:13px; padding-left:2px; color:#fff;
        }
        .vdur {
            position:absolute; bottom:5px; right:6px;
            background:rgba(0,0,0,0.82); color:#fff;
            font-size:0.6rem; font-weight:700; padding:2px 5px; border-radius:4px;
        }
        .vsite-badge {
            position:absolute; top:5px; left:5px;
            font-size:0.55rem; font-weight:800; padding:2px 6px; border-radius:4px;
        }
        .vinfo { padding:8px 9px 10px; }
        .vtitle {
            font-size:0.76rem; font-weight:600; line-height:1.35; color:#ddd;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
            margin-bottom:3px;
        }
        .vmeta { font-size:0.65rem; color:var(--muted); }

        /* SEARCH RESULTS MODE */
        .search-results-grid {
            display:none; flex-direction:column; gap:0;
        }
        .search-results-grid.show { display:flex; }
        .sresult {
            display:flex; align-items:center; gap:12px;
            padding:12px 14px; border-bottom:1px solid var(--border);
            text-decoration:none; color:var(--text); cursor:pointer;
            transition:background 0.12s;
        }
        .sresult:active { background:var(--s2); }
        .sresult-icon {
            width:44px; height:44px; border-radius:10px; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            font-size:1.3rem;
        }
        .sresult-info { flex:1; min-width:0; }
        .sresult-name { font-size:0.88rem; font-weight:700; margin-bottom:2px; }
        .sresult-desc { font-size:0.72rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sresult-arrow { color:var(--muted); font-size:0.9rem; }

        /* NO RESULTS */
        .no-res { display:none; text-align:center; padding:50px 20px; color:var(--muted); }
        .no-res.show { display:block; }
        .no-res p { font-size:0.9rem; margin-top:8px; }

        /* CATEGORY CHIPS */
        .cats {
            display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch;
            scrollbar-width:none; padding:0 14px 14px;
        }
        .cats::-webkit-scrollbar { display:none; }
        .cat {
            flex-shrink:0; padding:7px 14px; border-radius:20px;
            background:var(--s2); border:1px solid var(--border);
            color:var(--muted); font-size:0.75rem; font-weight:600;
            cursor:pointer; transition:all 0.15s;
        }
        .cat:active { background:var(--s3); color:var(--text); }

        /* TOAST */
        .toast {
            position:fixed; bottom:calc(var(--sb) + 20px); left:50%; transform:translateX(-50%) translateY(20px);
            background:var(--s3); color:var(--text); padding:10px 20px;
            border-radius:20px; font-size:0.8rem; font-weight:600;
            opacity:0; transition:all 0.3s; z-index:999; white-space:nowrap;
            border:1px solid var(--border);
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header class="hdr">

        <div class="search-box">

];

let activeSite = "all";
let searchQ = "";

// BUILD SITE TABS
const tabsEl = document.getElementById("siteTabs");
const allTab = document.createElement("div");
allTab.className = "stab active";
allTab.dataset.site = "all";
allTab.innerHTML = `<span class="stab-dot" style="background:linear-gradient(135deg,#ff2d2d,#ff6a00)"></span>Alle`;
tabsEl.appendChild(allTab);
SITES.forEach(s => {
    const t = document.createElement("div");
    t.className = "stab";
    t.dataset.site = s.id;
    t.innerHTML = `<span class="stab-dot" style="background:${s.color}"></span>${s.name}`;
    tabsEl.appendChild(t);
});

tabsEl.querySelectorAll(".stab").forEach(t => {
    t.addEventListener("click", () => {
        tabsEl.querySelectorAll(".stab").forEach(x => x.classList.remove("active"));
        t.classList.add("active");
        activeSite = t.dataset.site;
        if (searchQ.trim()) {
            doSearch(searchQ);
        } else {
            renderDefault();
        }
    });
});

// BUILD OPEN-ALL GRID
const openGrid = document.getElementById("openAllGrid");
const primaryBtn = document.createElement("a");
primaryBtn.className = "open-btn primary";
primaryBtn.href = "https://www.pornhub.com";
primaryBtn.target = "_blank";
primaryBtn.rel = "noopener noreferrer";
primaryBtn.textContent = "Åbn Pornhub nu";

    const b = document.createElement("a");
    b.className = "open-btn";
    b.href = s.url;
    b.target = "_blank";
    b.rel = "noopener noreferrer";
    b.innerHTML = `<span class="dot">${s.emoji}</span>${s.name}`;
    openGrid.appendChild(b);
});

// BUILD CATEGORIES
const catsEl = document.getElementById("catsRow");
CATEGORIES.forEach(c => {
    const chip = document.createElement("div");
    chip.className = "cat";
    chip.textContent = c;
    chip.addEventListener("click", () => {
        const q = c;
        document.getElementById("si").value = q;
        searchQ = q;
        doSearch(q);
    });
    catsEl.appendChild(chip);
});

// BUILD VIDEO CARDS
function renderDefault() {
    document.getElementById("defaultView").style.display = "block";
    document.getElementById("searchView").classList.remove("show");
    document.getElementById("noRes").classList.remove("show");
    document.getElementById("searchBar").classList.remove("show");

    const filtered = activeSite === "all" ? DUMMY : DUMMY.filter(v => v.site === activeSite);
    const grid = document.getElementById("vGrid");
    grid.innerHTML = "";
    filtered.forEach(v => {
        const s = SITES.find(x => x.id === v.site);
        const card = document.createElement("a");
        card.className = "vcard";
        card.href = s.url;
        card.target = "_blank";
        card.rel = "noopener noreferrer";
        card.innerHTML = `
            <div class="vthumb" style="background:${s.bg}">
                <span>${s.emoji}</span>

                <div class="vplay">▶</div>

                <div class="vsite-badge" style="background:${s.badgeColor};color:#fff">${s.badge}</div>

            <div class="vinfo">

                <div class="vmeta">${v.views} visninger</div>
            </div>`;
        grid.appendChild(card);
    });

    // Update primary open button
    if (activeSite !== "all") {
        const s = SITES.find(x => x.id === activeSite);
        primaryBtn.textContent = `Åbn ${s.name} nu`;
        primaryBtn.href = s.url;
    } else {
        primaryBtn.textContent = "Åbn Pornhub nu";
        primaryBtn.href = "https://www.pornhub.com";
    }
}

// SEARCH
function doSearch(q) {
    if (!q.trim()) { renderDefault(); return; }

    document.getElementById("defaultView").style.display = "none";
    const sv = document.getElementById("searchView");
    const nr = document.getElementById("noRes");
    const sb = document.getElementById("searchBar");
    sv.innerHTML = "";
    nr.classList.remove("show");
    sb.classList.add("show");
    document.getElementById("sqLabel").textContent = q;

    const sitesToSearch = activeSite === "all" ? SITES : SITES.filter(s => s.id === activeSite);
    document.getElementById("sqCount").textContent = sitesToSearch.length + " sites";

    sitesToSearch.forEach(s => {
        const url = s.search + encodeURIComponent(q);
        const row = document.createElement("a");
        row.className = "sresult";
        row.href = url;
        row.target = "_blank";
        row.rel = "noopener noreferrer";
        row.innerHTML = `
            <div class="sresult-icon" style="background:${s.bg}">${s.emoji}</div>
            <div class="sresult-info">

                <div class="sresult-desc">Søg "${q}" på ${s.name}</div>

            <div class="sresult-arrow">›</div>`;

}

const si = document.getElementById("si");

si.addEventListener("input", () => {
    searchQ = si.value;
    clrBtn.style.display = searchQ ? "flex" : "none";
    if (!searchQ.trim()) {
        renderDefault();
    } else {
        doSearch(searchQ);
    }
});

si.addEventListener("keydown", e => {
    if ((e.key === "Enter" || e.keyCode === 13) && searchQ.trim()) {
        si.blur();
        const sitesToSearch = activeSite === "all" ? SITES : SITES.filter(s => s.id === activeSite);
        // Open first 3 sites in search
        const toOpen = activeSite === "all" ? sitesToSearch.slice(0,3) : sitesToSearch;

        });
        showToast(`Åbner ${toOpen.length} site(s)...`);

});

clrBtn.addEventListener("click", () => {
    si.value = ""; searchQ = "";
    clrBtn.style.display = "none";
    renderDefault();
    si.focus();
});

function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
}

// INIT
renderDefault();
</script>
